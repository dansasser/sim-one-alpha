name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.18.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '10.10.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build WASM artifact
        run: pnpm run wasm:build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Fetch embedding model
        run: pnpm run fetch-embedding-model

      - name: Unit tests
        run: pnpm run test:unit
        env:
          GOROMBO_TEST_MODE: '1'

      - name: Rust crate tests
        run: pnpm run cargo:test

      - name: Build
        run: pnpm run build

      - name: Build CLI
        run: pnpm run build:cli

      - name: Verify CLI binary
        run: test -f .gorombo/sim-one-cli/cli.js

      - name: Integration tests
        run: pnpm run test:http
        env:
          GOROMBO_TEST_MODE: '1'

      - name: TUI end-to-end test
        run: pnpm run test:tui
        if: ${{ secrets.OLLAMA_API_KEY != '' }}
          GOROMBO_TEST_MODE: '1'
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Verify WASM artifact in build output
        run: test -f .gorombo/sim-one-alpha/memory/gorombo_memory_bg.wasm
