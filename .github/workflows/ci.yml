name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.10.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          cargo install wasm-pack --version 0.13.1 --locked || \
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh -s -- -f --version 0.13.1

      - name: Build WASM artifact
        run: pnpm run wasm:build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Fetch embedding model
        run: pnpm run fetch-embedding-model

      - name: Unit tests
        run: pnpm run test:unit
        env:
          GOROMBO_TEST_MODE: '1'

      - name: Rust crate tests
        run: pnpm run cargo:test

      - name: Build
        run: pnpm run build

      - name: Integration tests
        run: pnpm run test:http
        env:
          GOROMBO_TEST_MODE: '1'

      - name: Verify WASM artifact in dist
        run: test -f dist/memory/gorombo_memory_bg.wasm
