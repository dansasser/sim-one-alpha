name: smoke-memory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  # Deterministic smoke: drives the real Memory Helper tools + WASM engine +
  # SQLite + retrieve_memory + durability, plus the coding-worker path. No live
  # model required - reliable in CI.
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.18.0'
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '10.10.0'
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --version 0.13.1 --locked
      - run: pnpm run wasm:build
      - run: pnpm run build
      - run: pnpm run smoke:memory
        env:
          GOROMBO_TEST_MODE: '1'

  # Real-model smoke: boots the server and lets a live model drive the
  # orchestrator memory tools end-to-end, verifying durable persistence.
  # Manual dispatch only; requires the model API secrets to be present in the
  # repository secrets (OLLAMA_API_KEY, etc.) and a .env committed outside the
  # repo or provided via env. Skipped automatically when OLLAMA_API_KEY is absent.
  real-model-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.18.0'
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: '10.10.0'
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --version 0.13.1 --locked
      - run: pnpm run wasm:build
      - run: pnpm run build
      - name: Write .env from secrets
        id: setup_env
        run: |
          if [ -z "${{ secrets.OLLAMA_API_KEY }}" ]; then
            echo "OLLAMA_API_KEY secret not set; skipping real-model smoke."
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          {
            echo "OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }}"
            echo "API_SECRET=${{ secrets.GOROMBO_SMOKE_API_SECRET || 'smoke-secret' }}"
          } > .env
          echo "has_secrets=true" >> $GITHUB_OUTPUT
      - name: Run real-model smoke
        if: steps.setup_env.outputs.has_secrets == 'true'
        run: |
          if [ ! -s .env ]; then exit 0; fi
          GOROMBO_SMOKE_REAL_MODEL=1 GOROMBO_MEMORY_SQLITE_PATH=/tmp/real-model-smoke.sqlite pnpm run smoke:memory
