name: smoke-memory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.10.0'
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-pack --version 0.13.1 --locked || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh -s -- -f
      - run: pnpm run wasm:build
      - run: pnpm run smoke:memory
        env:
          GOROMBO_TEST_MODE: '1'
